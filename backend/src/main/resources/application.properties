# ===========================
# Sorting Visualizer - Spring Boot Config
# ===========================

# Server
server.port=8080

# MongoDB Atlas Connection
# Replace <username>, <password>, and <cluster-url> with your Atlas credentials
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=sorting_visualizer

# Jackson - pretty print JSON responses
spring.jackson.serialization.indent-output=true

# Logging
logging.level.com.sortingvisualizer=DEBUG
logging.level.org.springframework.data.mongodb=INFO

# App metadata
app.name=Sorting Visualizer Backend
app.version=1.0.0
